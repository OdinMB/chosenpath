services:
  - type: web
    name: ai-story-game-server
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && NODE_OPTIONS="--experimental-modules --es-module-specifier-resolution=node" npm start
    nodeVersion: 22.12.0
    envVars:
      - key: NODE_ENV
        value: production
